# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: Ruby

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test_flagd_provider:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/openfeature-flagd-provider
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.4"
          - "4.0"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically
        working-directory: ./providers/openfeature-flagd-provider
    - name: Launch flagd instance
      run: docker compose up -d flagd
      working-directory: ./providers/openfeature-flagd-provider/docker
    - name: Check linting
      run: bundle exec rubocop
    - name: Run tests
      run: bundle exec rspec
  test_meta_provider:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/openfeature-meta_provider
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.4"
          - "4.0"
